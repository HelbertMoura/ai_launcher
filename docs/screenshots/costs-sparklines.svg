<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Costs tab — editorial illustration">
  <style>
    .mono { font-family: "JetBrains Mono", "Cascadia Code", "Consolas", ui-monospace, monospace; }
    .t-cream { fill: #F5F1E8; }
    .t-cream2 { fill: #E8E4DB; }
    .t-muted { fill: #AFAAA0; }
    .t-muted2 { fill: #6D6A68; }
    .t-red { fill: #E5514F; }
  </style>

  <!-- Outer frame -->
  <rect x="0" y="0" width="1200" height="750" fill="#0A0A0C"/>
  <rect x="12" y="12" width="1176" height="726" rx="12" fill="#0F0F14" stroke="#2A2A30" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="12" y="12" width="1176" height="40" rx="12" fill="#141418"/>
  <rect x="12" y="40" width="1176" height="12" fill="#141418"/>
  <line x1="12" y1="52" x2="1188" y2="52" stroke="#2A2A30" stroke-width="1"/>
  <circle cx="34" cy="32" r="6" fill="#EC5545"/>
  <circle cx="54" cy="32" r="6" fill="#EFBF38"/>
  <circle cx="74" cy="32" r="6" fill="#55C658"/>
  <rect x="490" y="20" width="220" height="24" rx="12" fill="#1A1A1F" stroke="#2A2A30" stroke-width="1"/>
  <text x="600" y="36" class="mono t-muted" font-size="11" text-anchor="middle">ai-launcher — costs — v7.1</text>

  <!-- Hero: total today -->
  <g transform="translate(32,80)">
    <text x="0" y="18" class="mono t-red" font-size="14">&gt; total today</text>
    <text x="0" y="96" class="mono t-cream" font-size="72" font-weight="bold">$12.34</text>
    <text x="0" y="128" class="mono t-muted2" font-size="12">TODAY · Mon Apr 21, 2026</text>
  </g>

  <!-- Budget bar -->
  <g transform="translate(32,250)">
    <text x="0" y="16" class="mono t-muted" font-size="12">daily budget: $20</text>
    <text x="180" y="16" class="mono t-muted2" font-size="12">·</text>
    <text x="196" y="16" class="mono t-cream2" font-size="12">61% used</text>
    <text x="1136" y="16" class="mono t-cream" font-size="12" text-anchor="end">$12.34 / $20.00</text>
    <!-- track -->
    <rect x="0" y="32" width="1136" height="14" rx="7" fill="#1A1A1F" stroke="#2A2A30" stroke-width="1"/>
    <!-- fill (61% of 1136 ≈ 693) -->
    <rect x="0" y="32" width="693" height="14" rx="7" fill="#E5514F"/>
  </g>

  <!-- CLI rows -->
  <!-- Row 1: CLAUDE CODE -->
  <g transform="translate(32,340)">
    <rect x="0" y="0" width="1136" height="64" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="64" fill="#CC785C"/>
    <text x="24" y="38" class="mono t-cream" font-size="14" font-weight="bold">CLAUDE CODE</text>
    <text x="200" y="38" class="mono t-cream2" font-size="14">$8.40</text>
    <text x="280" y="38" class="mono t-muted2" font-size="11">·</text>
    <text x="296" y="38" class="mono t-muted" font-size="11">1.2M in / 340K out</text>
    <!-- sparkline rising -->
    <polyline points="880,48 900,44 920,46 940,38 960,32 980,28 1000,22 1020,18" fill="none" stroke="#E5514F" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="38" class="mono t-cream2" font-size="12" text-anchor="end">7d ↗</text>
  </g>

  <!-- Row 2: CODEX -->
  <g transform="translate(32,416)">
    <rect x="0" y="0" width="1136" height="64" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="64" fill="#10A37F"/>
    <text x="24" y="38" class="mono t-cream" font-size="14" font-weight="bold">CODEX</text>
    <text x="200" y="38" class="mono t-cream2" font-size="14">$2.15</text>
    <text x="280" y="38" class="mono t-muted2" font-size="11">·</text>
    <text x="296" y="38" class="mono t-muted" font-size="11">420K in / 88K out</text>
    <!-- sparkline flat -->
    <polyline points="880,36 900,34 920,36 940,34 960,36 980,34 1000,36 1020,34" fill="none" stroke="#E5514F" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="38" class="mono t-muted" font-size="12" text-anchor="end">7d →</text>
  </g>

  <!-- Row 3: GEMINI CLI -->
  <g transform="translate(32,492)">
    <rect x="0" y="0" width="1136" height="64" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="64" fill="#4285F4"/>
    <text x="24" y="38" class="mono t-cream" font-size="14" font-weight="bold">GEMINI CLI</text>
    <text x="200" y="38" class="mono t-cream2" font-size="14">$1.12</text>
    <text x="280" y="38" class="mono t-muted2" font-size="11">·</text>
    <text x="296" y="38" class="mono t-muted" font-size="11">1.8M in / 210K out</text>
    <!-- sparkline dipping -->
    <polyline points="880,22 900,24 920,28 940,32 960,38 980,42 1000,46 1020,48" fill="none" stroke="#E5514F" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="38" class="mono t-muted" font-size="12" text-anchor="end">7d ↘</text>
  </g>

  <!-- Row 4: QWEN CODE -->
  <g transform="translate(32,568)">
    <rect x="0" y="0" width="1136" height="64" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="64" fill="#615CED"/>
    <text x="24" y="38" class="mono t-cream" font-size="14" font-weight="bold">QWEN CODE</text>
    <text x="200" y="38" class="mono t-cream2" font-size="14">$0.67</text>
    <text x="280" y="38" class="mono t-muted2" font-size="11">·</text>
    <text x="296" y="38" class="mono t-muted" font-size="11">890K in / 120K out</text>
    <!-- sparkline rising gentle -->
    <polyline points="880,42 900,40 920,38 940,36 960,34 980,32 1000,30 1020,28" fill="none" stroke="#E5514F" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="38" class="mono t-cream2" font-size="12" text-anchor="end">7d ↗</text>
  </g>

  <!-- Status bar -->
  <line x1="12" y1="698" x2="1188" y2="698" stroke="#2A2A30" stroke-width="1"/>
  <rect x="12" y="698" width="1176" height="40" fill="#141418"/>
  <circle cx="32" cy="718" r="4" fill="#55C658"/>
  <text x="44" y="722" class="mono t-muted" font-size="11">cost</text>
  <text x="86" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="100" y="722" class="mono t-muted" font-size="11">4 CLIs</text>
  <text x="160" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="174" y="722" class="mono t-muted" font-size="11">budget 61%</text>
  <text x="272" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="286" y="722" class="mono t-muted" font-size="11">v7.1.0</text>
</svg>
