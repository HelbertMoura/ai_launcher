<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Command palette — editorial illustration">
  <style>
    .mono { font-family: "JetBrains Mono", "Cascadia Code", "Consolas", ui-monospace, monospace; }
    .t-cream { fill: #F5F1E8; }
    .t-cream2 { fill: #E8E4DB; }
    .t-muted { fill: #AFAAA0; }
    .t-muted2 { fill: #6D6A68; }
    .t-red { fill: #E5514F; }
  </style>

  <!-- Outer frame -->
  <rect x="0" y="0" width="1200" height="750" fill="#0A0A0C"/>
  <rect x="12" y="12" width="1176" height="726" rx="12" fill="#0F0F14" stroke="#2A2A30" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="12" y="12" width="1176" height="40" rx="12" fill="#141418"/>
  <rect x="12" y="40" width="1176" height="12" fill="#141418"/>
  <line x1="12" y1="52" x2="1188" y2="52" stroke="#2A2A30" stroke-width="1"/>
  <circle cx="34" cy="32" r="6" fill="#EC5545"/>
  <circle cx="54" cy="32" r="6" fill="#EFBF38"/>
  <circle cx="74" cy="32" r="6" fill="#55C658"/>
  <rect x="490" y="20" width="220" height="24" rx="12" fill="#1A1A1F" stroke="#2A2A30" stroke-width="1"/>
  <text x="600" y="36" class="mono t-muted" font-size="11" text-anchor="middle">ai-launcher — palette — v7.1</text>

  <!-- Blurred launcher background suggestion -->
  <g opacity="0.35">
    <!-- faint card ghosts -->
    <rect x="60" y="100" width="520" height="210" rx="8" fill="#141418"/>
    <rect x="60" y="100" width="4" height="210" fill="#CC785C"/>
    <rect x="620" y="100" width="520" height="210" rx="8" fill="#141418"/>
    <rect x="620" y="100" width="4" height="210" fill="#10A37F"/>
    <rect x="60" y="330" width="520" height="210" rx="8" fill="#141418"/>
    <rect x="60" y="330" width="4" height="210" fill="#4285F4"/>
    <rect x="620" y="330" width="520" height="210" rx="8" fill="#141418"/>
    <rect x="620" y="330" width="4" height="210" fill="#615CED"/>
  </g>
  <!-- dim overlay -->
  <rect x="12" y="52" width="1176" height="686" fill="#0A0A0C" opacity="0.55"/>

  <!-- Palette modal centered ~860x480 at (170,125) -->
  <g transform="translate(170,125)">
    <!-- Modal shadow -->
    <rect x="-4" y="6" width="868" height="484" rx="14" fill="#000000" opacity="0.4"/>
    <!-- Modal body -->
    <rect x="0" y="0" width="860" height="480" rx="12" fill="#16161A" stroke="#2A2A30" stroke-width="1"/>

    <!-- Search input -->
    <rect x="20" y="20" width="820" height="48" rx="8" fill="#0F0F14" stroke="#3A3A40" stroke-width="1"/>
    <text x="36" y="50" class="mono t-red" font-size="16">&gt;</text>
    <text x="56" y="50" class="mono t-muted" font-size="14">Type a command...</text>
    <!-- cursor -->
    <rect x="214" y="36" width="2" height="18" fill="#E5514F"/>

    <!-- Split layout: left pane (command list), right pane (preview) -->
    <!-- Left pane -->
    <g transform="translate(20,88)">
      <!-- pinned header -->
      <text x="0" y="14" class="mono t-red" font-size="11">&gt; pinned</text>

      <!-- pinned item 1 -->
      <g transform="translate(0,26)">
        <rect x="0" y="0" width="560" height="40" rx="6" fill="#141418"/>
        <!-- play triangle icon -->
        <polygon points="18,12 18,28 32,20" fill="#E5514F"/>
        <text x="44" y="25" class="mono t-cream" font-size="13">Launch claude in ./ai-launcher</text>
        <rect x="500" y="10" width="50" height="20" rx="4" fill="#0F0F14" stroke="#3A3A40" stroke-width="1"/>
        <text x="525" y="24" class="mono t-muted" font-size="11" text-anchor="middle">⌘↵</text>
      </g>

      <!-- pinned item 2 (selected) -->
      <g transform="translate(0,72)">
        <rect x="0" y="0" width="560" height="40" rx="6" fill="#1A1A1F"/>
        <rect x="0" y="0" width="3" height="40" fill="#E5514F"/>
        <!-- install down-arrow icon -->
        <g stroke="#10A37F" stroke-width="2" fill="none" stroke-linecap="round">
          <line x1="25" y1="10" x2="25" y2="24"/>
          <polyline points="19,19 25,26 31,19"/>
          <line x1="16" y1="30" x2="34" y2="30"/>
        </g>
        <text x="44" y="25" class="mono t-cream" font-size="13">Install codex (if missing)</text>
      </g>

      <!-- recent header -->
      <text x="0" y="138" class="mono t-red" font-size="11">&gt; recent</text>

      <!-- recent 1 -->
      <g transform="translate(0,150)">
        <rect x="0" y="0" width="560" height="32" rx="6" fill="#141418"/>
        <!-- refresh arc -->
        <g stroke="#AFAAA0" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M 18 16 A 8 8 0 1 1 14 22"/>
          <polyline points="14,22 14,26 10,26"/>
        </g>
        <text x="40" y="21" class="mono t-cream2" font-size="12">Re-run last: claude @ anthropic</text>
      </g>

      <!-- recent 2 -->
      <g transform="translate(0,186)">
        <rect x="0" y="0" width="560" height="32" rx="6" fill="#141418"/>
        <!-- save floppy -->
        <rect x="14" y="8" width="16" height="16" rx="2" fill="none" stroke="#AFAAA0" stroke-width="1.5"/>
        <rect x="17" y="8" width="10" height="5" fill="#AFAAA0"/>
        <rect x="17" y="17" width="10" height="5" fill="none" stroke="#AFAAA0" stroke-width="1"/>
        <text x="40" y="21" class="mono t-cream2" font-size="12">Save current as preset</text>
      </g>

      <!-- recent 3 -->
      <g transform="translate(0,222)">
        <rect x="0" y="0" width="560" height="32" rx="6" fill="#141418"/>
        <!-- switch arrows -->
        <g stroke="#615CED" stroke-width="2" fill="none" stroke-linecap="round">
          <line x1="14" y1="13" x2="30" y2="13"/>
          <polyline points="26,9 30,13 26,17"/>
          <line x1="30" y1="22" x2="14" y2="22"/>
          <polyline points="18,18 14,22 18,26"/>
        </g>
        <text x="40" y="21" class="mono t-cream2" font-size="12">Switch provider → kimi-k2</text>
      </g>

      <!-- all header -->
      <text x="0" y="278" class="mono t-red" font-size="11">&gt; all</text>

      <!-- all 1 -->
      <g transform="translate(0,290)">
        <rect x="0" y="0" width="560" height="28" rx="6" fill="#141418"/>
        <!-- gear -->
        <g fill="none" stroke="#AFAAA0" stroke-width="1.5">
          <circle cx="22" cy="14" r="5"/>
          <line x1="22" y1="5" x2="22" y2="9"/>
          <line x1="22" y1="19" x2="22" y2="23"/>
          <line x1="13" y1="14" x2="17" y2="14"/>
          <line x1="27" y1="14" x2="31" y2="14"/>
        </g>
        <text x="40" y="19" class="mono t-muted" font-size="11">Open admin</text>
      </g>

      <!-- all 2 -->
      <g transform="translate(0,322)">
        <rect x="0" y="0" width="560" height="28" rx="6" fill="#141418"/>
        <!-- globe -->
        <g fill="none" stroke="#AFAAA0" stroke-width="1.5">
          <circle cx="22" cy="14" r="7"/>
          <line x1="15" y1="14" x2="29" y2="14"/>
          <path d="M 22 7 Q 17 14 22 21"/>
          <path d="M 22 7 Q 27 14 22 21"/>
        </g>
        <text x="40" y="19" class="mono t-muted" font-size="11">Toggle language (EN/PT)</text>
      </g>

      <!-- all 3 -->
      <g transform="translate(0,354)">
        <rect x="0" y="0" width="560" height="28" rx="6" fill="#141418"/>
        <!-- palette squares -->
        <rect x="14" y="8" width="5" height="5" fill="#CC785C"/>
        <rect x="21" y="8" width="5" height="5" fill="#10A37F"/>
        <rect x="28" y="8" width="5" height="5" fill="#4285F4"/>
        <rect x="14" y="15" width="5" height="5" fill="#615CED"/>
        <rect x="21" y="15" width="5" height="5" fill="#E5514F"/>
        <rect x="28" y="15" width="5" height="5" fill="#EFBF38"/>
        <text x="40" y="19" class="mono t-muted" font-size="11">Cycle font</text>
      </g>
    </g>

    <!-- Right pane: preview -->
    <g transform="translate(600,88)">
      <rect x="0" y="0" width="240" height="320" rx="8" fill="#0F0F14" stroke="#2A2A30" stroke-width="1"/>
      <!-- header pill -->
      <rect x="12" y="12" width="74" height="22" rx="11" fill="#1A1A1F" stroke="#2A2A30" stroke-width="1"/>
      <text x="49" y="27" class="mono t-red" font-size="10" text-anchor="middle">&gt; preview</text>

      <text x="12" y="60" class="mono t-muted" font-size="10">command</text>
      <rect x="12" y="70" width="216" height="36" rx="4" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
      <text x="22" y="85" class="mono t-cream2" font-size="10">npm install -g</text>
      <text x="22" y="99" class="mono t-cream2" font-size="10">@openai/codex</text>

      <text x="12" y="132" class="mono t-muted" font-size="10">env vars</text>
      <rect x="12" y="142" width="216" height="28" rx="4" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
      <text x="22" y="160" class="mono t-muted2" font-size="10">none for install</text>

      <text x="12" y="196" class="mono t-muted" font-size="10">scope</text>
      <rect x="12" y="206" width="216" height="28" rx="4" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
      <text x="22" y="224" class="mono t-cream2" font-size="10">global npm registry</text>

      <!-- action hint -->
      <line x1="12" y1="270" x2="228" y2="270" stroke="#2A2A30" stroke-width="1"/>
      <text x="120" y="292" class="mono t-muted" font-size="10" text-anchor="middle">⌘↵ run · esc close</text>
    </g>

    <!-- Footer strip -->
    <line x1="0" y1="438" x2="860" y2="438" stroke="#2A2A30" stroke-width="1"/>
    <g transform="translate(20,448)">
      <!-- keycap: enter -->
      <rect x="0" y="0" width="28" height="24" rx="4" fill="#0F0F14" stroke="#3A3A40" stroke-width="1"/>
      <text x="14" y="17" class="mono t-cream" font-size="11" text-anchor="middle">↵</text>
      <text x="36" y="17" class="mono t-muted" font-size="11">launch</text>

      <!-- keycap: cmd+shift+C -->
      <rect x="100" y="0" width="72" height="24" rx="4" fill="#0F0F14" stroke="#3A3A40" stroke-width="1"/>
      <text x="136" y="17" class="mono t-cream" font-size="11" text-anchor="middle">⌘⇧C</text>
      <text x="180" y="17" class="mono t-muted" font-size="11">copy</text>

      <!-- keycap: esc -->
      <rect x="228" y="0" width="40" height="24" rx="4" fill="#0F0F14" stroke="#3A3A40" stroke-width="1"/>
      <text x="248" y="17" class="mono t-cream" font-size="11" text-anchor="middle">esc</text>
      <text x="276" y="17" class="mono t-muted" font-size="11">close</text>

      <!-- right side: version -->
      <text x="820" y="17" class="mono t-muted2" font-size="11" text-anchor="end">ai-launcher palette · v7.1</text>
    </g>
  </g>
</svg>
