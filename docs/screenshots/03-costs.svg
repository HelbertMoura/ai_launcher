<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="JetBrains Mono, monospace" font-size="12">
  <rect width="1200" height="750" fill="#0a0a0b"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="750" fill="#111114"/>
  <line x1="220" y1="0" x2="220" y2="750" stroke="#22222a"/>
  <text x="24" y="40" fill="#3b82f6" font-size="14" font-weight="700">▎ AI LAUNCHER</text>
  <text x="24" y="58" fill="#55555e" font-size="10">v10.0.0 · COMMAND DECK</text>

  <g font-size="13">
    <text x="28" y="122" fill="#c8c8d0">  Launch</text>
    <text x="28" y="156" fill="#c8c8d0">  Tools</text>
    <text x="28" y="186" fill="#c8c8d0">  History</text>
    <rect x="12" y="200" width="196" height="34" rx="4" fill="#1a1a20" stroke="#3b82f6"/>
    <text x="28" y="222" fill="#3b82f6">▸ Costs</text>
    <text x="28" y="256" fill="#c8c8d0">  Admin</text>
    <text x="28" y="286" fill="#c8c8d0">  Help</text>
    <text x="28" y="316" fill="#7a7a84">  Onboarding</text>
  </g>

  <!-- Top bar -->
  <rect x="220" y="0" width="980" height="56" fill="#0e0e12"/>
  <line x1="220" y1="56" x2="1200" y2="56" stroke="#22222a"/>
  <rect x="240" y="14" width="360" height="28" rx="6" fill="#17171c" stroke="#2a2a33"/>
  <text x="256" y="32" fill="#55555e">⌘K</text>
  <text x="296" y="32" fill="#8a8a94">Search commands, tabs, themes…</text>

  <g>
    <circle cx="720" cy="28" r="8" fill="#ff3131"/>
    <circle cx="742" cy="28" r="8" fill="#f5a524"/>
    <circle cx="764" cy="28" r="8" fill="#34c759"/>
    <circle cx="786" cy="28" r="8" fill="#3b82f6" stroke="#ffffff" stroke-opacity="0.25"/>
    <circle cx="808" cy="28" r="8" fill="#8b5cf6"/>
  </g>

  <rect x="840" y="14" width="60" height="28" rx="14" fill="#17171c" stroke="#2a2a33"/>
  <circle cx="856" cy="28" r="9" fill="#3b82f6"/>
  <text x="875" y="32" fill="#8a8a94" font-size="10">dark</text>

  <!-- Title -->
  <text x="244" y="98" fill="#eeeef2" font-size="24" font-weight="700">COSTS</text>
  <text x="244" y="120" fill="#7a7a84">Estimated spend — provider-aware, local-only</text>

  <!-- Big tile -->
  <rect x="244" y="150" width="600" height="180" rx="6" fill="#121218" stroke="#23232c"/>
  <text x="266" y="182" fill="#7a7a84" font-size="11">TODAY</text>
  <text x="266" y="260" fill="#3b82f6" font-size="72" font-weight="700">$0.42</text>
  <text x="266" y="290" fill="#8a8a94">across 12 sessions · 5 CLIs</text>

  <!-- Sparkline -->
  <g stroke="#3b82f6" stroke-width="2" fill="none">
    <polyline points="500,300 530,280 560,290 590,260 620,270 650,240 680,250 710,220 740,230 770,200 800,210 820,190"/>
  </g>
  <line x1="500" y1="310" x2="830" y2="310" stroke="#22222a"/>
  <text x="500" y="325" fill="#55555e" font-size="10">7-day trend</text>

  <!-- Budget bar -->
  <rect x="864" y="150" width="296" height="180" rx="6" fill="#121218" stroke="#23232c"/>
  <text x="886" y="182" fill="#7a7a84" font-size="11">DAILY BUDGET</text>
  <text x="886" y="218" fill="#eeeef2" font-size="20" font-weight="700">$0.42 / $5.00</text>
  <rect x="886" y="240" width="252" height="10" rx="5" fill="#17171c"/>
  <rect x="886" y="240" width="22" height="10" rx="5" fill="#3b82f6"/>
  <text x="886" y="276" fill="#34c759" font-size="11">● Within budget · 8%</text>
  <text x="886" y="300" fill="#7a7a84" font-size="11">Resets at midnight local</text>

  <!-- Per-CLI tiles -->
  <g font-size="12">
    <rect x="244" y="354" width="220" height="110" rx="6" fill="#121218" stroke="#23232c"/>
    <text x="264" y="380" fill="#eeeef2" font-weight="700">claude-code</text>
    <text x="264" y="422" fill="#3b82f6" font-size="28" font-weight="700">$0.18</text>
    <text x="264" y="448" fill="#7a7a84" font-size="11">4 sessions</text>

    <rect x="478" y="354" width="220" height="110" rx="6" fill="#121218" stroke="#23232c"/>
    <text x="498" y="380" fill="#eeeef2" font-weight="700">codex</text>
    <text x="498" y="422" fill="#3b82f6" font-size="28" font-weight="700">$0.12</text>
    <text x="498" y="448" fill="#7a7a84" font-size="11">3 sessions</text>

    <rect x="712" y="354" width="220" height="110" rx="6" fill="#121218" stroke="#23232c"/>
    <text x="732" y="380" fill="#eeeef2" font-weight="700">qwen</text>
    <text x="732" y="422" fill="#3b82f6" font-size="28" font-weight="700">$0.07</text>
    <text x="732" y="448" fill="#7a7a84" font-size="11">2 sessions</text>

    <rect x="946" y="354" width="220" height="110" rx="6" fill="#121218" stroke="#23232c"/>
    <text x="966" y="380" fill="#eeeef2" font-weight="700">aider</text>
    <text x="966" y="422" fill="#3b82f6" font-size="28" font-weight="700">$0.03</text>
    <text x="966" y="448" fill="#7a7a84" font-size="11">2 sessions</text>

    <rect x="244" y="484" width="220" height="110" rx="6" fill="#121218" stroke="#23232c"/>
    <text x="264" y="510" fill="#eeeef2" font-weight="700">copilot</text>
    <text x="264" y="552" fill="#3b82f6" font-size="28" font-weight="700">$0.02</text>
    <text x="264" y="578" fill="#7a7a84" font-size="11">1 session</text>

    <rect x="478" y="484" width="688" height="110" rx="6" fill="#0e0e12" stroke="#2a2a33" stroke-dasharray="4 4"/>
    <text x="822" y="544" fill="#55555e" text-anchor="middle">· · ·  more CLIs appear here as you use them  · · ·</text>
  </g>

  <!-- Status bar -->
  <rect x="220" y="718" width="980" height="32" fill="#0e0e12"/>
  <line x1="220" y1="718" x2="1200" y2="718" stroke="#22222a"/>
  <g font-size="11">
    <text x="244" y="738" fill="#8a8a94">12 sessions today</text>
    <text x="400" y="738" fill="#55555e">·</text>
    <circle cx="422" cy="734" r="4" fill="#3b82f6"/>
    <text x="434" y="738" fill="#3b82f6">ADMIN</text>
    <text x="490" y="738" fill="#55555e">·</text>
    <text x="510" y="738" fill="#8a8a94">$0.42 today</text>
    <text x="1140" y="738" fill="#55555e">v10.0.0</text>
  </g>
</svg>
