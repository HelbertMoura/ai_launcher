<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Launcher tab — editorial illustration">
  <style>
    .mono { font-family: "JetBrains Mono", "Cascadia Code", "Consolas", ui-monospace, monospace; }
    .t-cream { fill: #F5F1E8; }
    .t-cream2 { fill: #E8E4DB; }
    .t-muted { fill: #AFAAA0; }
    .t-muted2 { fill: #6D6A68; }
    .t-red { fill: #E5514F; }
  </style>

  <!-- Outer frame -->
  <rect x="0" y="0" width="1200" height="750" fill="#0A0A0C"/>
  <rect x="12" y="12" width="1176" height="726" rx="12" fill="#0F0F14" stroke="#2A2A30" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="12" y="12" width="1176" height="40" rx="12" fill="#141418"/>
  <rect x="12" y="40" width="1176" height="12" fill="#141418"/>
  <line x1="12" y1="52" x2="1188" y2="52" stroke="#2A2A30" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="34" cy="32" r="6" fill="#EC5545"/>
  <circle cx="54" cy="32" r="6" fill="#EFBF38"/>
  <circle cx="74" cy="32" r="6" fill="#55C658"/>

  <!-- Filename pill -->
  <rect x="490" y="20" width="220" height="24" rx="12" fill="#1A1A1F" stroke="#2A2A30" stroke-width="1"/>
  <text x="600" y="36" class="mono t-muted" font-size="11" text-anchor="middle">ai-launcher — launcher — v7.1</text>

  <!-- Header row -->
  <text x="32" y="86" class="mono t-red" font-size="14">&gt; launcher</text>
  <circle cx="980" cy="82" r="4" fill="#55C658"/>
  <text x="994" y="86" class="mono t-cream2" font-size="12">kimi-k2-0905</text>
  <text x="1110" y="86" class="mono t-muted2" font-size="12">· 256k</text>

  <!-- Card grid (2x2) -->
  <!-- Card 1: CLAUDE CODE -->
  <g transform="translate(32,110)">
    <rect x="0" y="0" width="560" height="240" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="240" fill="#CC785C"/>
    <text x="24" y="36" class="mono t-red" font-size="12">&gt;</text>
    <text x="44" y="36" class="mono t-cream" font-size="16" font-weight="bold">CLAUDE CODE</text>
    <circle cx="480" cy="31" r="4" fill="#55C658"/>
    <text x="494" y="36" class="mono t-muted" font-size="11">installed</text>
    <text x="24" y="58" class="mono t-muted2" font-size="11">v2.0.34</text>
    <line x1="24" y1="78" x2="536" y2="78" stroke="#2A2A30" stroke-width="1"/>
    <text x="24" y="108" class="mono t-cream2" font-size="12">Anthropic's official CLI. Multi-file</text>
    <text x="24" y="128" class="mono t-cream2" font-size="12">editing, shell access.</text>
    <rect x="24" y="170" width="100" height="34" rx="6" fill="#1A1A1F" stroke="#3A3A40" stroke-width="1"/>
    <text x="74" y="192" class="mono t-cream" font-size="12" text-anchor="middle">Launch</text>
    <rect x="136" y="170" width="100" height="34" rx="6" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <text x="186" y="192" class="mono t-muted" font-size="12" text-anchor="middle">Docs ↗</text>
  </g>

  <!-- Card 2: CODEX -->
  <g transform="translate(608,110)">
    <rect x="0" y="0" width="560" height="240" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="240" fill="#10A37F"/>
    <text x="24" y="36" class="mono t-red" font-size="12">&gt;</text>
    <text x="44" y="36" class="mono t-cream" font-size="16" font-weight="bold">CODEX</text>
    <circle cx="480" cy="31" r="4" fill="#55C658"/>
    <text x="494" y="36" class="mono t-muted" font-size="11">installed</text>
    <text x="24" y="58" class="mono t-muted2" font-size="11">v0.44.0</text>
    <line x1="24" y1="78" x2="536" y2="78" stroke="#2A2A30" stroke-width="1"/>
    <text x="24" y="108" class="mono t-cream2" font-size="12">OpenAI's agentic coder. Session</text>
    <text x="24" y="128" class="mono t-cream2" font-size="12">memory, bulk ops.</text>
    <rect x="24" y="170" width="100" height="34" rx="6" fill="#1A1A1F" stroke="#3A3A40" stroke-width="1"/>
    <text x="74" y="192" class="mono t-cream" font-size="12" text-anchor="middle">Launch</text>
    <rect x="136" y="170" width="100" height="34" rx="6" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <text x="186" y="192" class="mono t-muted" font-size="12" text-anchor="middle">Docs ↗</text>
  </g>

  <!-- Card 3: GEMINI CLI -->
  <g transform="translate(32,370)">
    <rect x="0" y="0" width="560" height="240" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="240" fill="#4285F4"/>
    <text x="24" y="36" class="mono t-red" font-size="12">&gt;</text>
    <text x="44" y="36" class="mono t-cream" font-size="16" font-weight="bold">GEMINI CLI</text>
    <circle cx="480" cy="31" r="4" fill="#55C658"/>
    <text x="494" y="36" class="mono t-muted" font-size="11">installed</text>
    <text x="24" y="58" class="mono t-muted2" font-size="11">v0.2.1</text>
    <line x1="24" y1="78" x2="536" y2="78" stroke="#2A2A30" stroke-width="1"/>
    <text x="24" y="108" class="mono t-cream2" font-size="12">Google's terminal-native assistant</text>
    <text x="24" y="128" class="mono t-cream2" font-size="12">with --yolo flag.</text>
    <rect x="24" y="170" width="100" height="34" rx="6" fill="#1A1A1F" stroke="#3A3A40" stroke-width="1"/>
    <text x="74" y="192" class="mono t-cream" font-size="12" text-anchor="middle">Launch</text>
    <rect x="136" y="170" width="100" height="34" rx="6" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <text x="186" y="192" class="mono t-muted" font-size="12" text-anchor="middle">Docs ↗</text>
  </g>

  <!-- Card 4: QWEN CODE -->
  <g transform="translate(608,370)">
    <rect x="0" y="0" width="560" height="240" rx="8" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="240" fill="#615CED"/>
    <text x="24" y="36" class="mono t-red" font-size="12">&gt;</text>
    <text x="44" y="36" class="mono t-cream" font-size="16" font-weight="bold">QWEN CODE</text>
    <circle cx="480" cy="31" r="4" fill="#55C658"/>
    <text x="494" y="36" class="mono t-muted" font-size="11">installed</text>
    <text x="24" y="58" class="mono t-muted2" font-size="11">v0.0.15</text>
    <line x1="24" y1="78" x2="536" y2="78" stroke="#2A2A30" stroke-width="1"/>
    <text x="24" y="108" class="mono t-cream2" font-size="12">Alibaba's Qwen-Coder —</text>
    <text x="24" y="128" class="mono t-cream2" font-size="12">qwen3-coder-plus backend.</text>
    <rect x="24" y="170" width="100" height="34" rx="6" fill="#1A1A1F" stroke="#3A3A40" stroke-width="1"/>
    <text x="74" y="192" class="mono t-cream" font-size="12" text-anchor="middle">Launch</text>
    <rect x="136" y="170" width="100" height="34" rx="6" fill="#141418" stroke="#2A2A30" stroke-width="1"/>
    <text x="186" y="192" class="mono t-muted" font-size="12" text-anchor="middle">Docs ↗</text>
  </g>

  <!-- Status bar -->
  <line x1="12" y1="698" x2="1188" y2="698" stroke="#2A2A30" stroke-width="1"/>
  <rect x="12" y="698" width="1176" height="40" fill="#141418"/>
  <circle cx="32" cy="718" r="4" fill="#55C658"/>
  <text x="44" y="722" class="mono t-muted" font-size="11">online</text>
  <text x="110" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="124" y="722" class="mono t-muted" font-size="11">6 providers</text>
  <text x="210" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="224" y="722" class="mono t-muted" font-size="11">4 CLIs detected</text>
  <text x="340" y="722" class="mono t-muted2" font-size="11">·</text>
  <text x="354" y="722" class="mono t-muted" font-size="11">⌘K palette</text>
</svg>
