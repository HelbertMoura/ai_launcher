<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" width="840" height="520" role="img" aria-label="AI Launcher Pro Command Deck terminal preview showing v15 features">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3131" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff3131" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3131" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#1a1a1d"/>
    </pattern>
  </defs>

  <!-- Terminal frame -->
  <rect x="20" y="10" width="800" height="500" rx="10" fill="url(#bg)" stroke="#1a1a1d" stroke-width="1"/>
  <rect x="20" y="10" width="800" height="500" rx="10" fill="url(#dotgrid)"/>

  <!-- Title bar -->
  <rect x="20" y="10" width="800" height="34" rx="10" fill="url(#bar)"/>
  <rect x="20" y="32" width="800" height="12" fill="url(#bar)"/>
  <line x1="20" y1="44" x2="820" y2="44" stroke="#1a1a1d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="40" cy="27" r="5.5" fill="#ff5f57"/>
  <circle cx="60" cy="27" r="5.5" fill="#febc2e"/>
  <circle cx="80" cy="27" r="5.5" fill="#28c840"/>

  <!-- Title text -->
  <text x="420" y="32" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3" text-anchor="middle" letter-spacing="2">AI LAUNCHER PRO · v15.0.0 · AI OPS COMMAND CENTER</text>

  <!-- Top accent glow -->
  <rect x="20" y="43" width="800" height="2" fill="url(#accentGlow)"/>

  <!-- Section header -->
  <text x="44" y="78" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3" letter-spacing="2">▎ WORKSPACE  ·  Launcher / Tools / History / Costs / Workspaces / Doctor / Updates</text>

  <!-- Bento grid: 2 columns -->
  <!-- Left column (wider): Profiles + Recent Sessions -->
  <rect x="44" y="96" width="460" height="140" rx="5" fill="#0d0d0f" stroke="#1a1a1d" stroke-width="1"/>
  <text x="60" y="116" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74" letter-spacing="2">WORKSPACE PROFILES · 2 pinned</text>

  <!-- Profile 1 (pinned, starred) -->
  <text x="60" y="140" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#ff3131">★</text>
  <text x="78" y="140" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#e6e6e8">ai-launcher</text>
  <text x="200" y="140" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#6b6b74">claude · anthropic</text>
  <text x="480" y="140" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f" text-anchor="end">●</text>

  <!-- Profile 2 (pinned) -->
  <text x="60" y="160" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#ff3131">★</text>
  <text x="78" y="160" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#e6e6e8">agent-playground</text>
  <text x="200" y="160" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#6b6b74">codex · openai</text>
  <text x="480" y="160" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f" text-anchor="end">●</text>

  <!-- Profile 3 -->
  <text x="78" y="180" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#9a9aa3">devmaniacs-site</text>
  <text x="200" y="180" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#6b6b74">gemini · google</text>
  <text x="480" y="180" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3" text-anchor="end">○</text>

  <!-- Divider -->
  <line x1="60" y1="196" x2="484" y2="196" stroke="#1a1a1d"/>

  <text x="60" y="215" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74" letter-spacing="2">RECENT SESSIONS</text>
  <text x="60" y="229" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">●</text>
  <text x="78" y="229" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#e6e6e8">claude · 2m ago</text>
  <text x="280" y="229" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#6b6b74">running · 2h 14m</text>

  <!-- Right column: Budget + Doctor -->
  <!-- Budget -->
  <rect x="516" y="96" width="280" height="64" rx="5" fill="#0d0d0f" stroke="#1a1a1d" stroke-width="1"/>
  <text x="532" y="116" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74" letter-spacing="2">BUDGET GUARD</text>
  <text x="532" y="136" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="14" fill="#e6e6e8" font-weight="bold">$4.20</text>
  <text x="582" y="136" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#6b6b74">/ $50.00 · 8%</text>
  <!-- Progress bar -->
  <rect x="532" y="145" width="248" height="4" rx="2" fill="#1a1a1d"/>
  <rect x="532" y="145" width="20" height="4" rx="2" fill="#35d07f"/>

  <!-- Doctor -->
  <rect x="516" y="172" width="280" height="64" rx="5" fill="#0d0d0f" stroke="#1a1a1d" stroke-width="1"/>
  <text x="532" y="192" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74" letter-spacing="2">ENVIRONMENT DOCTOR</text>
  <text x="532" y="213" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">✓ Node v22</text>
  <text x="620" y="213" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">✓ Git</text>
  <text x="680" y="213" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#ff9f1c">! pnpm</text>
  <text x="532" y="228" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74">12/13 healthy · 1 warning</text>

  <!-- History waterfall -->
  <text x="44" y="266" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3" letter-spacing="2">▎ HISTORY · last 24h</text>

  <!-- Timeline rows -->
  <text x="44" y="288" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#e6e6e8">claude</text>
  <rect x="120" y="280" width="380" height="10" rx="1" fill="#ff3131" opacity="0.9" filter="url(#glow)"/>
  <text x="700" y="288" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">●</text>
  <text x="720" y="288" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">running</text>

  <text x="44" y="310" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#e6e6e8">codex</text>
  <rect x="120" y="302" width="60" height="10" rx="1" fill="#6b6b74" opacity="0.7"/>
  <text x="700" y="310" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">✓</text>
  <text x="720" y="310" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">8m</text>

  <text x="44" y="332" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#e6e6e8">gemini</text>
  <rect x="200" y="324" width="40" height="10" rx="1" fill="#ff3131" opacity="0.8"/>
  <text x="700" y="332" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#ff3131">✗</text>
  <text x="720" y="332" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">failed</text>

  <!-- Axis -->
  <line x1="120" y1="345" x2="760" y2="345" stroke="#1a1a1d"/>
  <text x="120" y="358" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="9" fill="#6b6b74">00:00</text>
  <text x="280" y="358" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="9" fill="#6b6b74">08:00</text>
  <text x="440" y="358" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="9" fill="#6b6b74">16:00</text>
  <text x="760" y="358" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="9" fill="#ff3131" text-anchor="end">now</text>

  <!-- Status bar -->
  <rect x="20" y="408" width="800" height="38" fill="url(#bar)" stroke="#1a1a1d" stroke-width="1"/>
  <text x="44" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">▎ 7/8 online</text>
  <text x="160" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#ff9f1c">⬆ 2 updates</text>
  <text x="290" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">●</text>
  <text x="308" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#9a9aa3">Anthropic</text>
  <text x="400" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#e6e6e8" filter="url(#glow)">$4.20 today</text>
  <text x="540" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="11" fill="#35d07f">● claude · 2m ago</text>
  <text x="780" y="432" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="10" fill="#6b6b74" text-anchor="end">v15.0.0</text>

  <!-- Prompt below -->
  <text x="44" y="478" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#ff3131" font-weight="bold">$</text>
  <text x="58" y="478" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="12" fill="#e6e6e8"> ai-launcher launch --profile ai-launcher</text>

  <!-- Blinking cursor -->
  <rect x="390" y="467" width="8" height="14" fill="#ff3131" opacity="0.9" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle signature -->
  <text x="420" y="502" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-size="9" fill="#6b6b74" text-anchor="middle" letter-spacing="3">DEVMANIAC'S · COMMAND DECK</text>
</svg>
