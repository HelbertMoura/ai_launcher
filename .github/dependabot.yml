version: 2

# Atualizações automáticas de dependências. Agrupa minor/patch pra não gerar
# PR spam. Major fica separado pra review manual.

updates:
  # npm (frontend)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps
      include: scope
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      frontend-dev:
        applies-to: version-updates
        dependency-type: development

  # cargo (Rust backend)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
      include: scope
    groups:
      rust-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
