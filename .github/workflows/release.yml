name: release

# Dispara quando uma tag `v*` é pushada. Builda MSI + NSIS e anexa ao release
# correspondente (cria o release se ainda não existir).
#
# Signing opcional: configure os secrets `SIGNING_CERT_BASE64` e
# `SIGNING_CERT_PASSWORD` em Settings → Secrets and variables → Actions pra
# que os binários sejam assinados e o SmartScreen deixe de alertar.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag para anexar (ex: v5.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri bundle (MSI + NSIS)
        run: npm run tauri build

      # Signing é opt-in — só roda se o secret existir. Sem o secret, os
      # binários saem sem assinatura e os usuários verão o aviso SmartScreen.
      - name: Sign binaries (opt-in)
        if: env.SIGNING_CERT_BASE64 != ''
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
          $certPath = "$env:RUNNER_TEMP\code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.msi,*-setup.exe | ForEach-Object {
            & $signtool.FullName sign /f $certPath /p $env:SIGNING_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.msi,*-setup.exe | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.DirectoryName)/$($_.Name).sha256" -Encoding utf8
          }

      - name: Generate latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart('v')
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"

          $nsis = (Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1)
          $msi = (Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1)

          $checksum = ""
          if ($nsis) {
            $shaFile = "$($nsis.FullName).sha256"
            if (Test-Path $shaFile) {
              $checksum = (Get-Content $shaFile -Raw).Trim().Split()[0]
            }
          }

          $manifest = @{
            version = $version
            releaseDate = $date
            downloadUrls = @{
              windowsNsis = if ($nsis) { "https://github.com/HelbertMoura/ai_launcher/releases/download/$tag/$($nsis.Name)" } else { "" }
              windowsMsi = if ($msi) { "https://github.com/HelbertMoura/ai_launcher/releases/download/$tag/$($msi.Name)" } else { "" }
            }
            checksums = @{
              sha256 = $checksum
            }
            releaseNotes = ""
            releaseNotesUrl = "https://github.com/HelbertMoura/ai_launcher/releases/tag/$tag"
          }

          $manifest | ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8

      - name: Attach checksums and latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
            latest.json

      - name: Audit release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/audit-release.sh
          bash scripts/audit-release.sh "${{ github.event.inputs.tag || github.ref_name }}"
