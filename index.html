<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var THEMES = ["dark", "light"];
        var ACCENTS = ["red", "amber", "green", "blue", "violet"];
        try {
          var t = localStorage.getItem("ai-launcher:theme");
          var a = localStorage.getItem("ai-launcher:accent");
          document.documentElement.setAttribute(
            "data-theme",
            THEMES.indexOf(t) >= 0 ? t : "dark"
          );
          document.documentElement.setAttribute(
            "data-accent",
            ACCENTS.indexOf(a) >= 0 ? a : "red"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.setAttribute("data-accent", "red");
        }
      })();
    </script>
    <meta name="description" content="AI Launcher - Your ultimate desktop hub for AI coding CLIs." />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Launcher Pro - by Helbert Moura" />
    <meta property="og:description" content="Your ultimate desktop hub for AI coding CLIs. Built for speed, flexibility, and productivity." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="AI Launcher Pro - by Helbert Moura" />
    <meta property="twitter:description" content="Your ultimate desktop hub for AI coding CLIs. Built for speed, flexibility, and productivity." />

    <title>AI Launcher Pro - by Helbert Moura</title>
  </head>
  <body>
    <noscript>Você precisa habilitar o JavaScript para rodar este aplicativo. / You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
